# https://taskfile.dev/docs/guide
# https://taskfile.dev/reference/templating/
version: '3'
tasks:
  default: echo hi agent!
  
  log: |
    tail -f /tmp/test_agent*.log

  ulog: |
    log show --predicate 'processID == 1 AND eventMessage CONTAINS "lab.agent"' --last 10m --debug --info

  setup: |
    sudo ln -snf "{{.TASKFILE_DIR}}/test.sh" /usr/local/bin/test-agent.sh
    lctl add ./lab.agent.plist -u
  