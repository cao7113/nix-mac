# https://taskfile.dev
version: "3"
vars:
  # ubuntu box
  ubox_name: ubox1
  # alpine box
  abox_name: abox1
tasks:
  local: open http://orb.local

  ## Containers

  hi: open http://localhost
  hi.run: |
    # docker run -p 80:80 docker/getting-started
    docker run -it -p 80:80 docker/getting-started

  # orb config docker
  # orb logs docker

  ## Orb Machines

  m: |
    orb default           # get current default machine
    # orb default ubox1   # set current default machine
    orb ls

  ## ubuntu
  ubox.ops: |
    ansible-playbook -i inventory.yml playbook.yml --become
    # ansible -i inventory.yml box1 -m apt -a "pkg=snapd state=present" --become
    # ansible -i inventory.yml ubox1 -m community.general.snap -a "name=task state=present classic=true" --become -vvv

  ubox.up: | 
    # noble 202404
    orb create ubuntu:noble --arch amd64 {{.ubox_name}}
    # resolute 202604
    # jammy 202204
    # orb create ubuntu:jammy --arch amd64 {{.ubox_name}}

  ubox.del: orb delete -f {{.ubox_name}}
  ubox.reset: |
    task ubox.del || true
    task ubox.up
    task ubox.ops

  abox: |
    orb create alpine:3.19 --arch amd64 {{.abox_name}}


  ## Network debug
  # orb config docker # ~/.orbstack/config/docker.json 
  # orb restart docker
  # {
  #   "debug": true,
  #   "experimental": true
  # }

  # 自动使用系统的代理配置 https://docs.orbstack.dev/docker/network#proxies
  # orb config get network_proxy # auto
  # orb config set network_proxy http://host.orb.internal:1087 # 会将Network Proxy切换到Custom模式

  ## Setup
  conf: orb config show
  
  doc: |
    mkdir -p doc
    cd doc
    orb ssh > orb-ssh.txt
    orb --help > orb.txt
    orbctl --help > orbctl.txt
    orbctl run --help > orbctl-run.txt
    orbctl create --help > orbctl-create.txt

    cd ..
    mkdir -p _local
    ln -snf ~/.ssh _local/_ssh
    ln -snf ~/.orbstack/ssh _local/orb-ssh

  v: orb version
  setup: |
    brew install orbstack
  up: |
    brew upgrade orbstack
