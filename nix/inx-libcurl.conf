################################################################################
#                   Nix 网络下载与 libcurl 底层弱网优化配置                     #
################################################################################

# 1. 最大并发连接数 (Max Concurrent Connections)
# [官方默认值]: 25
# [弱网推荐值]: 2 - 5 (网速越差，越要调小)
# [原理说明]: 同时下载的文件数。弱网下调小它可以防止多通道互相抢夺带宽导致集体超时。
http-connections = 3

# 2. 二进制缓存替换作业并发数 (Max Substitution Jobs)
# [官方默认值]: 16 或取决于 CPU 核心数
# [弱网推荐值]: 2 - 4
# [原理说明]: 配合 http-connections 使用，控制本地同时向服务器查询和申请下载的任务流数量。
max-substitution-jobs = 3

# 3. 卡死超时断流判定 (Stalled Download Timeout)
# [官方默认值]: 300 (秒)
# [弱网推荐值]: 15 - 30 (不建议小于 10)
# [原理说明]: 单个文件下载速度连续降低到极低值（或 0）超过多少秒后，直接判定为卡死并掐断重试。
#            在不稳定的无线网络下，快速掐断并触发断点续传比死等 5 分钟高效得多。
stalled-download-timeout = 20

# 4. 单包最大重试次数 (Download Attempts)
# [官方默认值]: 5
# [弱网推荐值]: 10 - 15
# [原理说明]: 单个包下载卡死或失败后，Nix 允许重新尝试下载的最大次数。
#            弱网环境下配合上面的 stalled-download-timeout，靠高频率的重试冲过网络断流期。
download-attempts = 10

# 5. HTTP/2 多路复用 (HTTP/2 Multiplexing)
# [官方默认值]: true
# [弱网推荐值]: true
# [原理说明]: 允许在单个 TCP 连接上并发处理多个请求。如果你使用了本地代理工具（如 127.0.0.1），
#            开启此项能显著降低代理工具与外部握手的延迟开销。
http2 = true

################################################################################