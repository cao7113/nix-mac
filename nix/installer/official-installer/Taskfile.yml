# https://taskfile.dev/docs/guide
# https://taskfile.dev/reference/templating/
version: '3'
tasks:
  default: |
    echo hi nix-installer

  clone.repo: |
    git clone --depth=3 https://github.com/NixOS/nix-installer

  clone.pkgs: |
    git clone --branch nixpkgs-unstable --depth 1 https://github.com/NixOS/nixpkgs.git