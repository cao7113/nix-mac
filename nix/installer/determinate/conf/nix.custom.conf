# 提示：修改改文件后，darwin-rebuild switch后会自动生效，default.nix也设置自动关联

# https://nix.dev/manual/nix/2.34/command-ref/conf-file.html
# INFO determinate_nixd::wait: Restarting the Determinate Nix daemon because /etc/nix/nix.custom.conf changed
# 貌似修改/etc/nix/nix.custom.conf后会自动加载？？？

# ==============================================================================
# PRO CHINA OPTIMIZED NIX CONFIGURATION (FOR DETERMINATE SYSTEMS INSTALLER)
# Path: /etc/nix/nix.custom.conf
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 镜像源与二进制缓存优化 (Binary Cache & Mirrors)
# ------------------------------------------------------------------------------
# 核心技巧：使用空值覆盖 DetSys 默认的 extra-substituters，彻底断绝无谓的海外低速连接
# 然后重新定义我们信任的国内高速镜像。

# 强力洗白：用空值强制掐断任何潜在的追加源
extra-substituters = 
extra-trusted-substituters =

# 二进制缓存源重定义：给每一个源都死死打上显式优先级，绝不留无参数的尾巴！
substituters = https://mirrors.tuna.tsinghua.edu.cn/nix-channels/store?priority=10 https://mirrors.ustc.edu.cn/nix-channels/store?priority=20 https://cache.nixos.org?priority=40 https://install.determinate.systems?priority=50

# 把信任源也严格限制，防止 Nix 绕过主源去盲查验证
trusted-substituters = https://mirrors.tuna.tsinghua.edu.cn/nix-channels/store https://mirrors.ustc.edu.cn/nix-channels/store https://cache.nixos.org https://install.determinate.systems

# 信任这些全局 substituters 的公钥（保持默认并兼容）
trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= cache.flakehub.com-3:hJuILl5sVK4iKm86JzgdXW12Y2Hwd5G07qKtHTOcDCM= cache.flakehub.com-4:Asi8qIv291s0aYLyH6IOnr5Kf6+OF14WVjkE6t3xMio= cache.flakehub.com-5:zB96CRlL7tiPtzA9/WKyPkp3A2vqxqgdgyTVNGShPDU= cache.flakehub.com-6:W4EGFwAGgBj3he7c5fNh9NkOXw0PUVaxygCVKeuvaqU= cache.flakehub.com-7:mvxJ2DZVHn/kRxlIaxYNMuDG1OvMckZu32um1TadOR8= cache.flakehub.com-8:moO+OVS0mnTjBTcOUh2kYLQEd59ExzyoW1QgQ8XAARQ= cache.flakehub.com-9:wChaSeTI6TeCuV/Sg2513ZIM9i0qJaYsF+lZCXg0J6o= cache.flakehub.com-10:2GqeNlIp6AKp4EF2MVbE1kBOp9iBSyo0UPR9KoR0o1Y=

# ------------------------------------------------------------------------------
# 2. 网络超时与防卡死优化 (Network Fine-Tuning)
# ------------------------------------------------------------------------------
# 针对国内网络环境，缩短超时时间。如果镜像源没顶住，快速切换或报错，而不是无休止卡死。
connect-timeout = 5
download-attempts = 3

# 限制低速下载：如果下载速度连续 15 秒低于 100 字节/秒，直接中断重试，防止卡死在僵尸连接上
min-free-check-interval = 5

# 如果下载连接完全卡死或速度降为 0（即持续 15 秒没有任何数据传输），则强制断开并重试
stalled-download-timeout = 15

# ------------------------------------------------------------------------------
# 3. Flake 注册表与全局路径国内化 (Flake Registry & Channel Overrides)
# ------------------------------------------------------------------------------
# 覆盖 DetSys 默认的海外 FlakeHub NixPath，改用国内清华大学镜像源的 tarball
nix-path = nixpkgs=https://mirrors.tuna.tsinghua.edu.cn/nix-channels/nixpkgs-unstable/nixexprs.tar.xz

# 核心技巧：重定向全局 flake 注册表。当你运行 `nix shell nixpkgs#...` 时，
# 不去 GitHub 锁定的官方 Registry，而是直接读取本地映射，秒开！
# https://channels.nixos.org/flake-registry.json
flake-registry = /etc/nix/registry.json

# ------------------------------------------------------------------------------
# 4. 权限与多用户开发安全 (Security & Users)
# ------------------------------------------------------------------------------
trusted-users = root @wheel @admin